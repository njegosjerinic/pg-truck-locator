<!doctype html>
<html>
  <head>
    <title></title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="styles/styles.css" rel="stylesheet" />
    <script
      src="https://code.jquery.com/jquery-4.0.0.min.js"
      integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao="
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/handlebars@latest/dist/handlebars.js"></script>
    <script type="text/javascript" src="scripts/scripts.js"></script>
  </head>
  <body>
    <header class="header">
      <div class="desktop-container">
        <button class="hamburger-btn">☰</button>
        <div class="brand">
          <img
            src="assets/rioseo-logo.png"
            alt="Rio Seo Logo"
            class="brand-img-desktop"
          />
          <img
            src="assets/rioseo-logo-mobile.png"
            alt="Rio Seo Logo Mobile"
            class="brand-img-mobile"
          />
        </div>
        <div class="menu">
          <nav class="nav">
            <a href="#" class="nav-link">Menu</a>
          </nav>
          <div class="location-menu">
            <img src="assets/location-icon.png" alt="Location Image" />
            <p>Truck Locator</p>
          </div>
        </div>
        <img
          src="assets/location-icon-white.png"
          alt="Location icon"
          class="location-icon"
        />
      </div>
    </header>
    <main>
      <section class="content-container">
        <div class="page-header">
          <h2>Found 3 Taco Trucks in 92121</h2>
        </div>
        <div class="content">
          <div class="location-list"></div>
          <div class="map-wrap">
            <img class="map" />
            <div class="placeholder">
              <p>Click on a location card to load a map</p>
            </div>
            <div class="overlay">
              <div class="overlay-backdrop">
                <div class="overlay-panel">
                  <div class="overlay-closer">X</div>
                  <img src="/assets/placeholder.png" alt="" />

                  <h3 class="ov-name"></h3>
                  <p class="ov-address"></p>
                  <p class="ov-phone"></p>

                  <div class="ov-actions">
                    <button class="ov-number">
                      <img src="assets/phone-icon.png" alt="Phone number" />
                      <span>123-456-7890</span>
                    </button>
                    <button class="ov-directions">
                      <img src="assets/direction-icon.png" alt="Directions" />
                      <span>Get Directions</span>
                    </button>
                  </div>
                  <div class="details-container">
                    <div class="ov-hours"></div>

                    <button class="ov-details">VIEW FULL DETAILS</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="buttons">
          <button class="btn-list">List</button>
          <button class="btn-map">Map</button>
        </div>
      </section>
    </main>
  </body>
</html>
