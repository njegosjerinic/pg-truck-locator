<!doctype html>
<html>
  <head>
    <title></title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="styles/styles.css" rel="stylesheet" />
    <script
      src="https://code.jquery.com/jquery-4.0.0.min.js"
      integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao="
      crossorigin="anonymous"
    ></script>
    <script type="text/javascript" src="scripts/scripts.js"></script>
  </head>
  <body>
    <header class="header">
      <div class="container">
        <button class="hamburger-btn">☰</button>
        <div class="brand">
          <img
            src="assets/rioseo-logo.png"
            alt="Rio Seo Logo"
            class="brand-img-desktop"
          />
          <img
            src="assets/rioseo-logo-mobile.png"
            alt="Rio Seo Logo Mobile"
            class="brand-img-mobile"
          />
        </div>
        <div class="menu">
          <nav class="nav">
            <a href="#" class="nav-link">Menu</a>
          </nav>
          <div class="location-menu">
            <img src="assets/location-icon.png" alt="Location Image" />
            <span>Truck Locator</span>
          </div>
        </div>
        <img
          src="assets/location-icon-white.png"
          alt="Location icon"
          class="location-icon"
        />
      </div>
    </header>
    <main>
      <section class="content-container">
        <div class="page-header">
          <h1>Found <span id="truck-number"></span> Taco Trucks in 92121</h1>
        </div>
        <div class="content">
          <div class="location-list"></div>
          <div class="map-wrap">
            <img class="map" />
            <div class="placeholder">
              <p>Click on a location card to load a map</p>
            </div>
            <div class="overlay">
              <div class="overlay-backdrop">
                <div class="overlay-panel">
                  <div class="overlay-closer">
                    <svg
                      width="800px"
                      height="800px"
                      class="overlay-closer-icon"
                      viewBox="0 0 24 24"
                      fill="none"
                      xmlns="http://www.w3.org/2000/svg"
                    >
                      <path
                        d="M19 5L5 19"
                        stroke="#a2a2a4"
                        stroke-width="2"
                        stroke-linecap="round"
                      />
                      <path
                        d="M5 5L19 19"
                        stroke="#a2a2a4"
                        stroke-width="2"
                        stroke-linecap="round"
                      />
                    </svg>
                  </div>
                  <img src="assets/placeholder.png" alt="" />
                  <div class="overlay-content">
                    <h5 class="ov-name"></h5>
                    <div>
                      <span class="ov-address"></span>
                      <span class="ov-state"></span>
                    </div>

                    <div class="ov-actions">
                      <button class="ov-number">
                        <img src="assets/phone-icon.png" alt="Phone number" />
                        <a href="tel:123-456-7890">123-456-7890</a>
                      </button>
                      <button class="ov-directions">
                        <img src="assets/direction-icon.png" alt="Directions" />
                        <span>Get Directions</span>
                      </button>
                    </div>

                    <div class="ov-hours"></div>
                    <button class="ov-details">VIEW FULL DETAILS</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="buttons">
          <button class="btn-list">List</button>
          <button class="btn-map">Map</button>
        </div>
      </section>
    </main>
  </body>
</html>
