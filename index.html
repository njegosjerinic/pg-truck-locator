<!doctype html>
<html>
  <head>
    <title></title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link href="/styles/styles.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <script
      src="https://code.jquery.com/jquery-4.0.0.min.js"
      integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao="
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/handlebars@latest/dist/handlebars.js"></script>
    <script type="text/javascript" src="scripts/scripts.js"></script>
  </head>
  <body>
    <header class="header">
      <div class="desktop-container">
        <button class="hamburger-btn">☰</button>
        <div class="brand">
          <img
            src="assets/rioseo-logo.png"
            alt="Rio Seo Logo"
            class="brand-img-desktop"
          />
          <img
            src="assets/rioseo-logo-mobile.png"
            alt="Rio Seo Logo Mobile"
            class="brand-img-mobile"
          />
        </div>
        <div class="menu">
          <nav class="nav">
            <a href="#" class="nav-link">Menu</a>
          </nav>
          <div class="location-menu">
            <img src="assets/location-icon.png" alt="Location Image" />
            <p>Truck Locator</p>
          </div>
        </div>
        <img
          src="assets/location-icon-white.png"
          alt="Location icon"
          class="location-icon"
        />
      </div>
    </header>
    <main>
      <section class="page-header">
        <h2>Found 3 Taco Trucks in 92121</h2>
      </section>
      <section class="content-container">
        <div class="content">
          <div class="location-list"></div>
          <div class="map-wrap">
            <img class="map" />
          </div>
        </div>
        <div class="buttons">
          <button>List</button>
          <button>Map</button>
        </div>
      </section>
    </main>
  </body>
</html>
